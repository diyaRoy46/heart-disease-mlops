# Exposes the API outside the cluster.
# - Minikube:  minikube tunnel   (gives the LoadBalancer an external IP)
#              or: minikube service heart-disease-api --url
# - Cloud (EKS/GKE/AKS): a cloud load balancer is provisioned automatically.
apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api
  labels:
    app: heart-disease-api
spec:
  type: LoadBalancer
  selector:
    app: heart-disease-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
