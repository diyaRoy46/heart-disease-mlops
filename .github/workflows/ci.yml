name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check src tests scripts

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing

  train:
    name: Train model (smoke)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Train candidate models (reduced grids)
        run: python -m src.train --quick
      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            reports/model_comparison.md
            mlflow.db
          retention-days: 30

  docker:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t heart-disease-api .
      - name: Run container
        run: docker run -d --name api -p 8000:8000 heart-disease-api
      - name: Wait for healthy endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          echo "API never became healthy"; docker logs api; exit 1
      - name: Smoke test /predict
        run: |
          response=$(curl -sf -X POST http://localhost:8000/predict \
            -H 'Content-Type: application/json' \
            -d '{"age":57,"sex":1,"cp":4,"trestbps":140,"chol":241,"fbs":0,"restecg":1,"thalach":123,"exang":1,"oldpeak":0.2,"slope":2,"ca":0,"thal":7}')
          echo "$response"
          echo "$response" | grep -q '"prediction"' || { docker logs api; exit 1; }
      - name: Container logs
        if: always()
        run: docker logs api
